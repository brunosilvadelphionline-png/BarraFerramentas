[menu]
; Pasta onde ficam os atalhos.
; Subpastas viram submenus. Caminho pode ser absoluto ou relativo ao .pyw.
path = .\Menu

; Texto que aparece como tooltip ao passar o mouse no icone da bandeja.
title = Utilitarios

; Extensoes que aparecem como itens do menu.
; Informe com ou sem ponto, separadas por virgula, ponto-e-virgula ou espaco.
extensions = .bat, .cmd, .exe, .lnk, .ps1, .rdp

; true = mostra "backup.bat"  | false = mostra apenas "backup"
show_extensions = false

; --------------------------------------------------------------------
; Ordenacao e separadores
; --------------------------------------------------------------------
; Prefixo numerico opcional define a ordem (e e' removido do nome exibido):
;   10_Versao.bat       -> "Versao"
;   20_Exe Teste.bat    -> "Exe Teste"
;   30_Deletar DCU.bat  -> "Deletar DCU"
;   40_---.txt          -> separador horizontal
;   50_Licencas\        -> submenu "Licencas"
;
; Aceita "10_", "10-", "10.", "10 " como separador entre prefixo e nome.
; Itens sem prefixo aparecem depois, com pastas antes dos arquivos.
;
; Separador: qualquer arquivo cujo nome (sem prefixo e sem extensao)
; seja apenas tracos (-- ou mais). Use extensao .txt para criar facil
; pelo Explorer. Ex.: "40_---.txt", "55_----.txt".
